{% extends 'base.html' %}

{% block title %}Nuovo Piatto - Negozio Online{% endblock %}

{% block content %}
<a href="/" style="font-size:0.9rem;color:#636e72;">← Torna alle categorie</a>
<h1 style="margin-top:0.8rem;">➕ Nuovo Piatto</h1>

<div class="card" style="max-width:480px;">
    <form method="POST" action="/crea_piatto">
        <label for="categoria_id">Categoria</label>
        <select id="categoria_id" name="categoria_id" required>
            <option value="" disabled selected>Seleziona una categoria...</option>
            {% for cat in categories %}
            <option value="{{ cat['id'] }}">{{ cat['nome'] }}</option>
            {% endfor %}
        </select>

        <label for="nome">Nome Piatto</label>
        <input type="text" id="nome" name="nome"
               placeholder="Es. Laptop Pro" required>

        <label for="prezzo">Prezzo (€)</label>
        <input type="number" id="prezzo" name="prezzo"
               placeholder="Es. 99.99" step="0.01" min="0" required>

        <button type="submit" class="btn btn-primary">Crea Piatto</button>
    </form>
</div>
{% endblock %}
